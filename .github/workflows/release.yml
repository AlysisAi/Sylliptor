name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if tag != version:
              raise SystemExit(f"tag v{tag} does not match package version {version}")
          PY

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build twine pipx

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest -q

      - name: Build distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Smoke install wheel
        env:
          PIPX_HOME: ${{ runner.temp }}/pipx-home
          PIPX_BIN_DIR: ${{ runner.temp }}/pipx-bin
        run: |
          python -m pipx install dist/*.whl
          "$PIPX_BIN_DIR/sylliptor" --help
          "$PIPX_BIN_DIR/sylliptor" --version

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
