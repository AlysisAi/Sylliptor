name: Bug report
description: Report a reproducible bug in Sylliptor.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in
        the sections below so we can reproduce and fix the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short, clear description of the bug.
      placeholder: e.g. `sylliptor chat` exits after the provider returns an empty response.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, exact commands or actions that trigger the bug.
      placeholder: |
        1. Configure the provider/profile you are using.
        2. Run the exact command or chat action that fails.
        3. Paste the error or describe the incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error message and stack trace if possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sylliptor version
      description: Output of `sylliptor --version` (or commit SHA if running from source).
      placeholder: 0.9.1
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.11.x
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, config snippets, screenshots, anything else relevant.
