name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (ubuntu-latest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {"python-version":"3.11"}
          - {"python-version":"3.12"}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest -q

  macos-smoke:
    name: macOS smoke
    runs-on: macos-latest
    env:
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Smoke test CLI
        run: |
          sylliptor --help
          sylliptor --version

  package:
    name: package smoke
    runs-on: ubuntu-latest
    needs:
      - test
      - macos-smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pipx
          python -m build
          python -m twine check dist/*

      - name: Smoke install wheel
        env:
          PIPX_HOME: ${{ runner.temp }}/pipx-home
          PIPX_BIN_DIR: ${{ runner.temp }}/pipx-bin
        run: |
          python -m pipx install dist/*.whl
          "$PIPX_BIN_DIR/sylliptor" --help
          "$PIPX_BIN_DIR/sylliptor" --version

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
